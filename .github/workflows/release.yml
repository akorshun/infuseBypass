name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build InfuseBypass.framework
        run: |
          xcodebuild build \
            -project InfuseBypass.xcodeproj \
            -scheme InfuseBypass \
            -destination 'generic/platform=tvOS' \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Build insert_dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib.git
          cd insert_dylib
          xcodebuild build \
            -project insert_dylib.xcodeproj \
            -scheme insert_dylib \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/insert_dylib_build"
          TOOL=$(find "$GITHUB_WORKSPACE/insert_dylib_build" -name "insert_dylib" -type f | head -1)
          cp "$TOOL" /usr/local/bin/insert_dylib
          chmod +x /usr/local/bin/insert_dylib

      - name: Download original IPA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ipa-source \
            --repo ${{ github.repository }} \
            --pattern "*.ipa" \
            --dir orig_ipa

      - name: Patch IPA
        run: |
          # Locate framework (Products only, not TBD stubs) and IPA
          FRAMEWORK=$(find DerivedData/Build/Products -name "InfuseBypass.framework" -type d | head -1)
          IPA=$(find orig_ipa -name "*.ipa" | head -1)
          echo "Framework: $FRAMEWORK"
          echo "IPA: $IPA"

          # Extract IPA
          mkdir -p Payload_work
          unzip -q "$IPA" -d Payload_work

          # Fix CFBundleName: underscores are rejected by Apple's addAppId API
          INFOPLIST="Payload_work/Payload/Infuse.app/Info.plist"
          BUNDLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFOPLIST" 2>/dev/null || true)
          echo "CFBundleName before: $BUNDLE_NAME"
          if [[ "$BUNDLE_NAME" == *"_"* ]]; then
            FIXED="${BUNDLE_NAME//_/ }"
            /usr/libexec/PlistBuddy -c "Set :CFBundleName $FIXED" "$INFOPLIST"
            echo "CFBundleName fixed: $FIXED"
          fi

          # Copy framework into app bundle
          cp -r "$FRAMEWORK" Payload_work/Payload/Infuse.app/Frameworks/

          # Insert dylib load command; pipe 'yes' to auto-confirm fat binary prompt
          cd Payload_work/Payload/Infuse.app
          yes | insert_dylib \
            --overwrite \
            @executable_path/Frameworks/InfuseBypass.framework/InfuseBypass \
            Infuse
          mv Infuse_patched Infuse
          cd "$GITHUB_WORKSPACE"

          # Repack IPA
          cd Payload_work
          zip -qr ../InfusePro8_tvOS_sideload_patched.ipa Payload
          cd "$GITHUB_WORKSPACE"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            InfusePro8_tvOS_sideload_patched.ipa
          generate_release_notes: true
